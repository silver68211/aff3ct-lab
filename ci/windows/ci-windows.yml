########################
## build windows jobs ##
########################

.tags-windows:
  tags:
    - x86_64
    - windows
    - nlohmann

.config-msys2:
  extends: .tags-windows
  variables:
    MSYSTEM: "MINGW64"
    CHERE_INVOKING: "yes"   
  before_script:
    - hostname
    - whoami
    - $env:CMAKE_PREFIX_PATH +=";$Env:SystemDrive\msys64\mingw64"
    - $Env:CMAKE_INSTALL_PREFIX +=";$Env:SystemDrive\msys64\mingw64"
    - $Env:path += ";$Env:SystemDrive\msys64\usr\bin;$Env:SystemDrive\msys64\mingw64\bin"

# GCC (MSYS2)
# -----------

.build-win-msys2:
  extends: .config-msys2
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    CMAKE_INCLUDE_PATH: C:/msys64/mingw64/include/
  needs:
  - job: analysis-cppcheck
    artifacts: false
  - job: analysis-headers
    artifacts: false

.build-windows-gcc :
  extends: .build-win-msys2
  parallel:
    matrix:
      - COMPILER: gcc-x86-sse4.2
        CFLAGS: -msse4.2
      - COMPILER: gcc-x64-avx2
        CFLAGS: -mavx2
  image: registry.gitlab.com/aff3ct/aff3ct/x86_64_windows_gcc:v8.1.0
  variables:
    CFLAGS: -Wall -funroll-loops -m64 $CFLAGS
    LFLAGS: -static -static-libgcc -static-libstdc++
    CMAKE_OPT: -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_COMPILE_STATIC_LIB=ON -DAFF3CT_COMPILE_SHARED_LIB=ON -DAFF3CT_PREC=MULTI -DAFF3CT_EXT_STRINGS=OFF -DSPU_STACKTRACE=OFF
    NAME: build_windows_${COMPILER}
  script:
    - ./ci/windows/build-windows-gcc.bat

build-windows-gcc-artifacts:
  extends: .build-windows-gcc
  artifacts:
    name: build-windows-${COMPILER}
    paths:
      - build_windows_${COMPILER}
  rules: 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH == "master" 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH == "develop"

build-windows-gcc:
  extends: .build-windows-gcc
  rules: 
    - if: $CI_SERVER_HOST != "gitlab.com" 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "develop"

# MSVC
# ----

.build-windows-msvc:
  extends: .tags-windows 
  stage: build
  rules:
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    #CMAKE_TOOLCHAIN_FILE: "C:/Users/ci/vcpkg/scripts/buildsystems/vcpkg.cmake"   #SPU_CMAKE_PREFIX_PATH:C:/Users/ci/vcpkg/installed/x64-windows/debugC:/Users/ci/vcpkg/installed/x64-windows
    CMAKE_PREFIX_PATH : "C:/Users/ci/vcpkg/installed/x64-windows"
  needs:
  # - job: analysis-cppcheck
  #   artifacts: false
   - job: analysis-headers
     artifacts: false
  before_script:
    - hostname
    - whoami

.build-windows-msvc-avx:
  extends: .build-windows-msvc
  image: registry.gitlab.com/aff3ct/aff3ct/x86_64_windows_msvc:v15
  variables:
    CFLAGS: -D_CRT_SECURE_NO_DEPRECATE /MT /EHsc /arch:AVX
    CMAKE_OPT: -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_COMPILE_STATIC_LIB=ON -DAFF3CT_COMPILE_SHARED_LIB=ON -DAFF3CT_PREC=MULTI -DSPU_STACKTRACE=OFF -DCMAKE_TOOLCHAIN_FILE=${CMAKE_TOOLCHAIN_FILE} #-DCMAKE_VERBOSE_MAKEFILE=ON
    NAME: build_windows_msvc_avx

  script:
    - ./ci/windows/build-windows-msvc.bat

build-windows-msvc-avx-artifacts:
  extends: .build-windows-msvc-avx
  artifacts:
    name: build-windows-msvc-avx
    paths:
      - build_windows_msvc_avx
  rules: 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH == "master" 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH == "develop"

build-windows-msvc-avx:
  extends: .build-windows-msvc-avx
  rules: 
    - if: $CI_SERVER_HOST != "gitlab.com" 
    - if: $CI_SERVER_HOST == "gitlab.com" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "develop"
