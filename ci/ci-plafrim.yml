
.config-common-plafrim:
  tags:
    - plafrim
  retry: 2
  script:
    - sbatch --wait ${NAME}.slurm
  after_script:
    - scancel --name="${NAME}" --user=$(whoami) || true
    - cat ${NAME}.out
    - cat ${NAME}.err
    - cd ../..
  cache: {}

################################# Build Linux ####################################################################################################################################################################################

.build-plafrim:
  extends: .config-common-plafrim
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_STRATEGY: clone
    CMAKE_PREFIX_PATH: /cm/shared/dev/modules/generic/apps/tools/nlohmann-json/3.11.3
  needs:
  - job: analysis-cppcheck
    artifacts: false
  - job: analysis-headers
    artifacts: false
  before_script:
    - hostname
    - whoami
    - pwd
    - echo $NAME
    - |
      cat <<EOF > ${NAME}.slurm
      #!/bin/bash
      #SBATCH -N 1
      #SBATCH -n 36
      #SBATCH -C bora
      #SBATCH --exclusive
      #SBATCH --job-name=${NAME}_$CI_PIPELINE_ID
      #SBATCH --output=${NAME}.out
      #SBATCH --error=${NAME}.err
      #SBATCH --time=00:30:00
      
      set -x

      module load tools/git                \
                  tools/nlohmann-json/3.11.3      \
                  build/cmake             \
                  ${MODULE_COMPILER}              \
                  ${MODULE_SPE}

      source ./ci/tools/threads.sh
      ./ci/build-linux-macos.sh

      ${CMD_SPE}

      EOF
    - cat ${NAME}.slurm


##################################################################################### gcc """"""""""""""""""""

.build-plafrim-gcc:
  extends: .build-plafrim
  variables:
    CC: gcc
    CXX: g++
    MODULE_COMPILER: compiler/gcc
    CFLAGS: -Wall -funroll-loops $CFLAGS_SPE
    CMAKE_OPT: -DAFF3CT_JSON=${JSON} -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_COMPILE_STATIC_LIB=ON -DAFF3CT_COMPILE_SHARED_LIB=ON -DAFF3CT_PREC=${AFF3CT_PREC} -DAFF3CT_EXT_STRINGS=OFF ${CMAKE_OPT_SPE}
    NAME: 'build_linux_${COMPILER}_json_${JSON}'
  artifacts:
    name: build-linux-${COMPILER}-json-${JSON}
    paths:
      - ${NAME}
      - ${NAME}.out

build-linux-gcc:
  extends: .build-plafrim-gcc
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  parallel:
    matrix:
      - COMPILER: gcc-x64-sse4.2
        CFLAGS_SPE: -m64 -msse4.2
        JSON: ['ON']
        AFF3CT_PREC: MULTI
        LFLAGS: -Wl,--whole-archive -lrt -lpthread -Wl,--no-whole-archive

build-linux-gcc-opt:
  extends: .build-plafrim-gcc
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  parallel:
    matrix:
      - COMPILER: gcc-nointr
        CFLAGS_SPE: -DMIPP_NO_INTRINSICS
        JSON: ['ON']
        AFF3CT_PREC: MULTI
        LFLAGS: -Wl,--whole-archive -lrt -lpthread -Wl,--no-whole-archive
    
      - COMPILER: gcc-x64-sse4.2
        CFLAGS_SPE: -m64 -msse4.2
        JSON: ['OFF','ON']
        AFF3CT_PREC: MULTI
        LFLAGS: -Wl,--whole-archive -lrt -lpthread -Wl,--no-whole-archive
    
      - COMPILER: gcc-x64-avx2
        CFLAGS_SPE: -m64 -mavx2 -mfma
        JSON: ['ON']
        AFF3CT_PREC: MULTI
        LFLAGS: -Wl,--whole-archive -lrt -lpthread -Wl,--no-whole-archive
    
      - COMPILER: gcc-8-bit
        CFLAGS_SPE: -march=native
        JSON: ['OFF', 'ON']
        AFF3CT_PREC: '8'
        CMAKE_OPT_SPE: -DAFF3CT_LINK_GSL=ON
        MODULE_SPE: linalg/gsl/2.8
      
      - COMPILER: gcc-x64-sse4.2
        CFLAGS_SPE: -m64 -msse4.2
        JSON: ['OFF']
        AFF3CT_PREC: MULTI
        LFLAGS: -Wl,--whole-archive -lrt -lpthread -Wl,--no-whole-archive

build-linux-gcc-mpi:
  extends: .build-plafrim-gcc
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  parallel:
    matrix:
      - JSON: ['OFF','ON']
  variables:
    COMPILER: gcc-mpi
    MODULE_SPE: mpi/openmpi/5.0.1 linalg/gsl/2.8
    CFLAGS_SPE: -march=native
    CMAKE_OPT: -DAFF3CT_JSON=${JSON} -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_COMPILE_STATIC_LIB=OFF -DAFF3CT_COMPILE_SHARED_LIB=OFF -DAFF3CT_PREC=MULTI -DAFF3CT_EXT_STRINGS=OFF -DAFF3CT_LINK_GSL=ON -DAFF3CT_MPI=ON
    NAME: build_linux_gcc_mpi_${JSON}


build-linux-gcc-coverage:
  extends: .build-plafrim-gcc
  variables:
    CFLAGS_SPE: -msse4.2 --coverage
    LFLAGS: --coverage
    CMAKE_OPT: -DAFF3CT_JSON=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS_DEBUG=-O0 -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_PREC=MULTI
    NAME: build_linux_gcc_coverage
    CMD_SPE: |
              rm -rf build/lib/
              find build/CMakeFiles/aff3ct-obj.dir/ -name "*.o" -type f -delete
              tar -czvf build.tar.gz build
  artifacts:
    name: build
    paths:
      - build.tar.gz
      - ${NAME}.out


##################################################################################### clang """"""""""""""""""""

.build-plafrim-clang:
  extends: .build-plafrim
  variables:
    MODULE_COMPILER: #??
    CC: clang
    CXX: clang++

#no plafrim module so in main pipline file

##################################################################################### icpc """"""""""""""""""""

.build-plafrim-icpc:
  extends: .build-plafrim
  variables:
    MODULE_COMPILER: compiler/intel
    CC: icx
    CXX: icpx


build-linux-icpc:
  extends: .build-plafrim-icpc
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  parallel:
    matrix:
      - JSON: ['OFF','ON']
  variables:
    GIT_TAG: v0.0.0
    CFLAGS: -Wall -funroll-loops -march=native -std=c++11
    CMAKE_OPT: -DAFF3CT_JSON=${JSON} -DAFF3CT_COMPILE_EXE=ON -DAFF3CT_COMPILE_STATIC_LIB=ON -DAFF3CT_COMPILE_SHARED_LIB=ON -DAFF3CT_PREC=MULTI -DAFF3CT_EXT_STRINGS=OFF -DAFF3CT_LINK_GSL=OFF -DAFF3CT_LINK_MKL=ON
    NAME: build_linux_icpc_${JSON}
    MODULE_SPE: linalg/mkl/2022.0.2
  artifacts:
    name: build-linux-icpc-json-${JSON}
    paths:
      - ${NAME}
      - ${NAME}.out


####################################################### Check ################################################################################################################################################################

check-documentation:
  extends: .config-common-plafrim
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  stage: check
  needs:
    - job: build-linux-gcc
      artifacts: true
  variables:
    NAME: check-documentation
  before_script:
    - hostname
    - whoami
    - pwd
    - |
      cat <<EOF > ${NAME}.slurm
      #!/bin/bash
      #SBATCH -N 1
      #SBATCH -n 36
      #SBATCH -C bora
      #SBATCH --exclusive
      #SBATCH --job-name=${NAME}_$CI_PIPELINE_ID
      #SBATCH --output=${NAME}.out
      #SBATCH --error=${NAME}.err
      #SBATCH --time=01:00:00
      
      set -x

      module load tools/git                \
                  tools/nlohmann-json/3.11.3      \
                  language/python/3.9             \

      ./ci/check-documentation.py --aff3ct "build_linux_gcc-x64-sse4.2_json_ON/bin/aff3ct"

      EOF
    - cat ${NAME}.slurm


################################# Regression ####################################################################################################################################################################################


test-regression:
  extends: .config-common-plafrim
  parallel:
    matrix:
      - {T_MAX: 2, CODE: BCH,       RESULT: bch }
      - {T_MAX: 6, CODE: LDPC,      RESULT: ldpc }
      - {T_MAX: 2, CODE: POLAR,     RESULT: polar }
      - {T_MAX: 2, CODE: POLAR_MK,  RESULT: polar-mk }
      - {T_MAX: 2, CODE: RA,        RESULT: ra }
      - {T_MAX: 2, CODE: REP,       RESULT: rep }
      - {T_MAX: 2, CODE: RS,        RESULT: rs }
      - {T_MAX: 2, CODE: RSC,       RESULT: rsc }
      - {T_MAX: 2, CODE: RSC_DB,    RESULT: rsc-db }
      - {T_MAX: 2, CODE: TURBO,     RESULT: turbo }
      - {T_MAX: 2, CODE: TURBO_DB,  RESULT: turbo-db }
      - {T_MAX: 6, CODE: TURBO_PROD,RESULT: turbo-prod }
      - {T_MAX: 2, CODE: UNCODED,   RESULT: uncoded }
  timeout: 24h
  stage: test
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    VAR_NAME: CI_AFF3CT_TEST_${CODE}_TIME_SEC
    BUILD_PATH: build_linux_gcc-x64-sse4.2_json_ON
    RESULT_NAME: test-regression-results-${RESULT}
  needs:
    - job: build-linux-gcc
      artifacts: true
  artifacts:
     name: ${RESULT_NAME}
     when: always
     paths:
      - ${RESULT_NAME}/
      - ${RESULT_NAME}.out

  before_script:
    - hostname
    - whoami
    - pwd

    - source ./ci/tools/threads.sh
    - source ./ci/tools/git-version.sh
    - echo "VAR_NAME=${VAR_NAME}"
    - export TIME_SEC="${!VAR_NAME}"
    - |
      cat <<EOF > run_${CODE}.slurm
      #!/bin/bash
      #SBATCH -N 1
      #SBATCH -n 36 
      #SBATCH -C bora
      #SBATCH --exclusive
      #SBATCH --job-name=regression_${CODE}_$CI_PIPELINE_ID
      #SBATCH --output=test-regression-results-${RESULT}.out
      #SBATCH --error=test-regression-results-${RESULT}.err
      #SBATCH --time=0${T_MAX}:00:00

      set -x

      module load tools/git             \
                  tools/nlohmann-json/3.11.3   \
                  build/cmake           \
                  compiler/gcc          \
                  language/python/3.9

      echo "./ci/test-regression.py --refs-path refs/${CODE} --results-path ${RESULT_NAME} --build-path ${BUILD_PATH} --binary-path bin/aff3ct-${GIT_VERSION} --max-snr-time ${TIME_SEC} --sensibility 2.5 --weak-rate 0.9 --verbose 1 --n-threads $THREADS"
      ./ci/test-regression.py --refs-path refs/${CODE} --results-path ${RESULT_NAME} --build-path ${BUILD_PATH} --binary-path bin/aff3ct-${GIT_VERSION} --max-snr-time ${TIME_SEC} --sensibility 2.5 --weak-rate 0.9 --verbose 1 --n-threads $THREADS

      EOF
    - cat run_${CODE}.slurm

  script:
    - sbatch --wait run_${CODE}.slurm
  after_script:
    - scancel --name="regression_${CODE}" --user=$(whoami) || true
    - cat test-regression-results-${RESULT}.out



####################################################### TEST ################################################################################################################################################################

### Coverage

.test-coverage:
  extends: .config-common-plafrim
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  stage: coverage
  needs:
    - job: build-linux-gcc-coverage
      artifacts: true
  before_script:
    - hostname
    - whoami
    - pwd
    - echo $NAME
    - |
      cat <<EOF > ${NAME}.slurm
      #!/bin/bash
      #SBATCH -N 1
      #SBATCH -n 36
      #SBATCH -C bora
      #SBATCH --exclusive
      #SBATCH --job-name=${NAME}_$CI_PIPELINE_ID
      #SBATCH --output=${NAME}.out
      #SBATCH --error=${NAME}.err
      #SBATCH --time=02:00:00

      set -x

      module load tools/git                \
                  tools/nlohmann-json/3.11.3      \
                  language/python/3.9             

      ${CMD_SPE}

      EOF
    - cat ${NAME}.slurm

test-coverage-regression:
  extends: .test-coverage
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    NAME: 'test-coverage-regression'
    CMD_SPE: |
              tar -xvvf build.tar.gz
              source ./ci/tools/git-version.sh
              ./ci/test-coverage-regression.sh
  artifacts:
     name: code-coverage-files
     when: always
     paths:
      - code_coverage_files/


coverage-linux:
  extends: .test-coverage
  needs:
  - job: test-coverage-regression
    artifacts: true
  coverage: '/.*lines\.*: (\d+.\d+\%)/'
  artifacts:
     name: code-coverage-report
     when: always
     paths:
       - code_coverage_report/
  variables:
    NAME: test-coverage-regression
    CMD_SPE: ./ci/coverage-linux.sh


####################################################### clean_up ################################################################################################################################################################

cleanup_slurm_jobs:
  stage: .post
  interruptible: false
  tags: ['plafrim']
  dependencies: []
  script:
    - echo "Checking for Slurm jobs to cancel for pipeline $CI_PIPELINE_ID..."
    - JOBS=$(squeue -u "$USER" -h -o "%i %j" | awk '$2 ~ /_'"$CI_PIPELINE_ID"'$/ {print $1}')
    - if [[ -n "$JOBS" ]]; then echo "$JOBS" | xargs scancel; fi
  when: always
  
